<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الشبح بالصوت - ساهر</title>
    <style>
        :root { --neon-purple: #bc13fe; }
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        .header {
            background: #111;
            padding: 15px;
            border-bottom: 3px solid var(--neon-purple);
            display: flex;
            justify-content: space-around;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.6);
        }
        #score { color: var(--neon-purple); font-weight: bold; font-size: 1.5rem; text-shadow: 0 0 10px var(--neon-purple); }
        #ghost {
            position: absolute;
            font-size: 60px;
            cursor: pointer;
            filter: drop-shadow(0 0 15px var(--neon-purple));
            z-index: 100;
        }
        .overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--neon-purple);
            z-index: 1000;
            width: 80%;
            max-width: 320px;
        }
        button {
            background: var(--neon-purple);
            color: white; border: none; padding: 15px 30px; font-size: 1.2rem;
            font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>النقاط: <span id="score">0</span> / 20</div>
        <div>الوقت: <span id="timer">15:00</span></div>
    </div>

    <div id="start-screen" class="overlay">
        <h1 style="color: var(--neon-purple);">تحدي الأشباح 👻</h1>
        <p>الهدف: 20 نقطة<br>الوقت: 15 دقيقة<br>اسمع صوت الصيد! 🔊</p>
        <button onclick="startGame()">ابدأ اللعب يا ساهر 🏹</button>
    </div>

    <div id="ghost" style="display: none;">👻</div>

    <audio id="hitSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="loseSound" src="https://assets.mixkit.co/active_storage/sfx/2513/2513-preview.mp3"></audio>

    <script>
        let score = 0;
        let totalSeconds = 15 * 60; 
        let gameInterval;
        let autoMove;
        const targetScore = 20;
        
        const ghostEl = document.getElementById('ghost');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const startScreen = document.getElementById('start-screen');
        
        // جلب عناصر الصوت
        const hitSound = document.getElementById('hitSound');
        const winSound = document.getElementById('winSound');
        const loseSound = document.getElementById('loseSound');

        function moveGhost() {
            const maxX = window.innerWidth - 80;
            const maxY = window.innerHeight - 150;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * (maxY - 100)) + 100;
            ghostEl.style.left = randomX + 'px';
            ghostEl.style.top = randomY + 'px';
        }

        function hit(e) {
            if(e) e.preventDefault();
            
            // تشغيل صوت الخبطة
            hitSound.currentTime = 0;
            hitSound.play();
            
            score++;
            scoreEl.innerText = score;
            
            if (score >= targetScore) winGame();
            else moveGhost();
        }

        ghostEl.addEventListener('touchstart', hit);
        ghostEl.addEventListener('mousedown', hit);

        function updateTimerDisplay() {
            let mins = Math.floor(totalSeconds / 60);
            let secs = totalSeconds % 60;
            timerEl.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function startGame() {
            score = 0;
            totalSeconds = 15 * 60;
            scoreEl.innerText = score;
            updateTimerDisplay();
            startScreen.style.display = 'none';
            ghostEl.style.display = 'block';
            moveGhost();

            gameInterval = setInterval(() => {
                totalSeconds--;
                updateTimerDisplay();
                if (totalSeconds <= 0) endGame();
            }, 1000);
            
            autoMove = setInterval(() => {
                if(totalSeconds > 0) moveGhost();
            }, 500); 
        }

        function winGame() {
            clearInterval(gameInterval);
            clearInterval(autoMove);
            winSound.play(); // صوت الفوز
            ghostEl.style.display = 'none';
            startScreen.style.display = 'block';
            startScreen.innerHTML = `
                <h1 style="color: var(--neon-purple);">وحش الأشباح! 🏆</h1>
                <p>صيدت الـ 20 بنجاح يا ساهر.</p>
                <button onclick="location.reload()">لعب تاني 🔄</button>
            `;
        }

        function endGame() {
            clearInterval(gameInterval);
            clearInterval(autoMove);
            loseSound.play(); // صوت الخسارة
            ghostEl.style.display = 'none';
            startScreen.style.display = 'block';
            startScreen.innerHTML = `
                <h1 style="color: #ff0000;">انتهى الوقت!</h1>
                <button onclick="location.reload()">حاول تاني 💪</button>
            `;
        }
    </script>
</body>
</html>
